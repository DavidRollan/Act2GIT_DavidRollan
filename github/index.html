<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IES Pablo Picasso</title>
    <style>
        /* Estilos generales */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Estilos de la cabecera */
        header {
            background-color: #333;
            color: white;
            padding: 1em;
            text-align: center;
        }

        /* Estilos del menú */
        nav {
            background-color: #444;
        }

        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        nav ul li {
            margin: 0 1em;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            padding: 0.5em 1em;
            display: block;
        }

        nav ul li a:hover {
            background-color: #555;
        }

        /* Estilos del contenido principal */
        main {
            flex: 1;
            padding: 2em;
            text-align: center;
        }

        /* Estilos del pie de página */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1em;
        }
    </style>
</head>
<body>

    <!-- Cabecera -->
    <header>
        <h1>Bienvenidos a IES Pablo Picasso</h1>
    </header>

    <!-- Menú de navegación -->
    <nav>
        <ul>
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#horario">Horario</a></li>
        </ul>
    </nav>

    <!-- Contenido principal -->
    <main>
        <section id="inicio">
            <h2>Inicio</h2>
            <p>Bienvenidos a nuestra página web. Aquí encontrarás toda la información que necesitas.</p>
        </section>
        
        <section id="horario">
            <h2>Horario</h2>
            <p>Consulta aquí el horario de nuestras actividades y clases.</p>
        </section>
    </main>

    <!-- Pie de página -->
    <footer>
        <p>Desarrollado por IES Pablo Picasso</p>
    </footer>

</body>
</html>
